name: AURA On-Merge Brief

on:
  pull_request:
    types: [closed]

permissions:
  contents: read

jobs:
  aura:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.11"
      - run: python -m pip install open-aura
      - run: aura run --trigger on-merge
        env:
          AURA_TRIGGER: on-merge
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit brief to aura-docs/
        run: |
          git config user.name "aura-bot"
          git config user.email "aura@users.noreply.github.com"
          git add aura-docs/ || true
          git diff --staged --quiet || git commit -m "docs(aura): on-merge brief $(date +%Y-%m-%d)"
          git push
